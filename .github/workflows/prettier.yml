name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@1a351e0837c4bfaf7f714fef78334175d42aba0c # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
