name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@01ece6b3982e1bfdef2c97ac9e2089288568d07f # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
