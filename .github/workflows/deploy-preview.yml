name: deploy-preview

permissions: {}

on:
  workflow_call:
    inputs:
      image:
        default: grafana/docs-base:latest
        description: Container image to use for building the website.
        type: string
      # Legacy inputs
      # Don't forget to make `sources` required when you remove these.
      source_directory:
        default: docs/sources
        type: string
      website_directory:
        type: string
      relative_prefix:
        type: string
      index_file: # creates the necessary project _index.md file for versioned repos
        type: boolean
      # End legacy inputs
      sources:
        description: |
          sources is a JSON string describing multiple source mounts.

          It replaces the individual inputs used in the previous version of this action.

          The structure is an array of objects, each with the following keys:

          index_file:
            description: Path to index file used to redirect versioned projects. For example, "content/docs/mimir/_index.md".
            required: true
            type: string
          relative_prefix:
            description: The URL path prefix for the mount destination. For example, "/docs/mimir/latest/".
            required: true
            type: string
          repo:
            description: The Grafana repository name for the source files. For example, "mimir".
            required: true
            type: string
          source_directory:
            description: The path to the source files in the repository. For example, "docs/sources".
            required: true
            type: string
          website_directory:
            description: The path to mount the documentation in the website content structure. For example, "content/docs/mimir/latest".
            required: true
            type: string

          The following example mounts both the Mimir documentation and the mimir-distributed Helm chart documentation:

          [
            {
              "index_file": true,
              "relative_prefix": "/docs/mimir/latest/",
              "repo": "mimir",
              "source_directory": "docs/sources/mimir",
              "website_directory": "content/docs/mimir/latest"
            },
            {
              "index_file": true,
              "relative_prefix": "/docs/helm-charts/mimir-distributed/latest/",
              "repo": "mimir",
              "source_directory": "docs/sources/mimir-distributed",
              "website_directory": "content/docs/helm-charts/mimir-distributed/latest"
            }
          ]
        type: string
      sha:
        required: true
        type: string
      toolkit_ref:
        description: Ref used to checkout writers-toolkit helper files (branch, tag, or SHA). Defaults to PR SHA when running in writers-toolkit, otherwise main.
        required: false
        default: ""
        type: string
      branch:
        required: true
        type: string
      event_number:
        required: true
        type: string
      repo:
        required: true
        type: string
      title:
        required: true
        type: string

env:
  CLOUD_RUN_REGION: us-south1
  SHA: ${{ inputs.sha }}
  BRANCH: ${{ inputs.branch }}
  EVENT_NUMBER: ${{ inputs.event_number }}
  TITLE: ${{ inputs.title }}
  REPO: ${{ inputs.repo }}
  SOURCE_DIRECTORY: ${{ inputs.source_directory }}
  WEBSITE_DIRECTORY: ${{ inputs.website_directory }}
  INDEX_FILE: ${{ inputs.index_file }}
  RELATIVE_PREFIX: ${{ inputs.relative_prefix }}
  IMAGE: ${{ inputs.image }}
  SOURCES: ${{ inputs.sources }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.repo }}-${{ inputs.title }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-website:
    permissions:
      contents: read # Clone repositories.
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: inputs.website_directory
        with:
          persist-credentials: false
          sparse-checkout-cone-mode: false # exclude root files
          sparse-checkout: docs

      - name: Sparse checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: grafana/writers-toolkit
          ref: ${{ inputs.toolkit_ref != '' && inputs.toolkit_ref || (github.repository == 'grafana/writers-toolkit' && inputs.sha || 'main') }}
          path: deploy-preview-files
          persist-credentials: false
          sparse-checkout: |
            deploy-preview
            link-checker

      - name: Keep only necessary files
        if: inputs.website_directory
        shell: bash
        env:
          SOURCE_DIRECTORY: ${{ inputs.source_directory }}
        run: |
          shopt -s extglob
          rm -rf !(docs|deploy-preview-files|.git)
          ls -al
          ls -al "${SOURCE_DIRECTORY}"
          ls -al deploy-preview-files

      # sparse checkout with cone mode disabled includes root files, even when using exclusions
      # see https://github.com/actions/checkout/issues/1430#issuecomment-1756326892
      - name: Keep only necessary files
        if: "!inputs.website_directory"
        shell: bash
        run: |
          shopt -s extglob
          rm -rf !(deploy-preview-files|.git)
          ls -al .
          ls -al deploy-preview-files

      - name: Build website
        shell: bash
        env:
          # Legacy input.
          SOURCE_DIRECTORY: ${{ env.SOURCE_DIRECTORY }}
          WEBSITE_DIRECTORY: ${{ env.WEBSITE_DIRECTORY }}
          INDEX_FILE: ${{ env.INDEX_FILE }}
          REPO: ${{ env.REPO }}
          # End legacy input.
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ env.IMAGE }}
          SOURCES: ${{ env.SOURCES }}
          BRANCH: ${{ env.BRANCH }}
        run: ./deploy-preview-files/deploy-preview/build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ inputs.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-preview:
    permissions:
      contents: read # Clone repositories.
      id-token: write # Fetch Vault secrets.
      pull-requests: write # Create or update PR comments.
      statuses: write # Update GitHub status check with deploy preview link.
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    needs: build-website
    runs-on: ubuntu-latest
    steps:
      - name: Find comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        id: fc
        with:
          issue-number: ${{ inputs.event_number }}
          comment-author: github-actions[bot]
          body-includes: Deploy preview available (${{ inputs.title }})

      - name: Update comment with in-progress deploy preview
        if: steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ inputs.event_number }}
          edit-mode: append
          append-separator: newline
          body: |
            :building_construction: Updating deploy preview...

      - name: Sparse checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: grafana/writers-toolkit
          ref: ${{ inputs.toolkit_ref != '' && inputs.toolkit_ref || (github.repository == 'grafana/writers-toolkit' && inputs.sha || 'main') }}
          path: deploy-preview-files
          persist-credentials: false
          sparse-checkout: |
            deploy-preview

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.sha }}
          path: dist

      - name: Print build header value
        shell: bash
        env:
          SHA: ${{ inputs.sha }}
        run: |
          printf "%s" "add_header 'Build' '"${SHA}"';" > build.conf

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        id: gcloud-auth
        with:
          token_format: access_token
          workload_identity_provider: projects/304398677251/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-docs-deploy-previews@grafanalabs-workload-identity.iam.gserviceaccount.com
          create_credentials_file: false

      - name: Login to GAR
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcloud-auth.outputs.access_token }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: us-docker.pkg.dev/grafanalabs-dev/docker-docs-previews-dev/${{ env.REPO }}
          tags: |-
            ${{ env.SHA }}
            ${{ env.EVENT_NUMBER }}

      - name: Set up Docker Buildx
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: false
          driver: docker-container

      - name: Build the container
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: ./deploy-preview-files/deploy-preview/Dockerfile

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: gcloud-auth-cloud-run
        with:
          workload_identity_provider: projects/304398677251/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-docs-cloud-run-dev@grafanalabs-workload-identity.iam.gserviceaccount.com

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        id: deploy
        with:
          image: us-docker.pkg.dev/grafanalabs-dev/docker-docs-previews-dev/${{ env.REPO }}:${{ env.SHA }}
          service: deploy-preview-${{ env.REPO }}-${{ env.EVENT_NUMBER }}
          project_id: grafanalabs-dev
          region: ${{ env.CLOUD_RUN_REGION }}
          flags: --port=80 --ingress=all --allow-unauthenticated

      - name: Send commit status
        uses: ouzi-dev/commit-status-updater@26588d166ff273fc4c0664517359948f7cdc9bf1 # v2.0.2
        if: inputs.website_directory

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        if: github.event.action == 'closed'
        with:
          name: deploy_preview
          status: ${{ job.status }}
          url: ${{ steps.deploy.outputs.url }}${{ inputs.relative_prefix }}

      - name: Send commit status
        uses: ouzi-dev/commit-status-updater@26588d166ff273fc4c0664517359948f7cdc9bf1 # v2.0.2
        if: "!env.WEBSITE_DIRECTORY"
        with:
          name: deploy_preview
          status: ${{ job.status }}
          url: ${{ steps.deploy.outputs.url }}${{ (fromJSON(env.SOURCES))[0].relative_prefix }}
          description: Public deploy preview

      - name: Get preview URLs
        id: urls
        if: "!inputs.website_directory"
        shell: bash
        env:
          SOURCES: ${{ env.SOURCES }}
          URL: ${{ steps.deploy.outputs.url }}
        run: ./deploy-preview-files/deploy-preview/urls

      - name: Create comment with available deploy preview
        if: inputs.website_directory && steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ env.EVENT_NUMBER }}
          body: |
            :computer: Deploy preview available (${{ inputs.title }}): ${{ steps.deploy.outputs.url }}${{ inputs.relative_prefix }}

      - name: Create comment with available deploy preview
        if: "!inputs.website_directory && steps.fc.outputs.comment-id == ''"
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ inputs.event_number }}
          body: |
            :computer: Deploy preview available (${{ inputs.title }}):
            ${{ steps.urls.outputs.urls }}

      - name: Update comment with available deploy preview
        if: inputs.website_directory && steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ env.EVENT_NUMBER }}
          edit-mode: replace
          body: |
            :computer: Deploy preview available (${{ inputs.title }}): ${{ steps.deploy.outputs.url }}${{ inputs.relative_prefix }}

      - name: Update comment with available deploy preview
        if: "!inputs.website_directory && steps.fc.outputs.comment-id != ''"
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ env.EVENT_NUMBER }}
          edit-mode: replace
          body: |
            :computer: Deploy preview available (${{ inputs.title }}):
            ${{ steps.urls.outputs.urls }}

  check-links:
    permissions:
      contents: read
      pull-requests: write
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    needs: build-website
    runs-on: ubuntu-latest
    steps:
      - name: Sparse checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: grafana/writers-toolkit
          ref: ${{ inputs.sha }}
          persist-credentials: false
          fetch-depth: 0
          sparse-checkout: |
            deploy-preview
            docs/sources
            link-checker

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.sha }}
          path: dist

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 1.22.x

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install nginx
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx

      - name: Check links
        run: go run ./link-checker/cmd/link-checker check

      - name: Print nginx error log
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -f error.log ]]; then
            cat error.log
          fi

      - name: Print nginx access log
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -f access.log ]]; then
            cat access.log
          fi

      - name: Print links.json
        run: cat links.json

      - name: Upload links report
        id: upload-links
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: links-${{ inputs.sha }}.json
          path: links.json
          if-no-files-found: error
          retention-days: 7

      - name: Generate broken links comment
        shell: bash
        env:
          SOURCES: ${{ env.SOURCES }}
          SOURCE_DIRECTORY: ${{ env.SOURCE_DIRECTORY }}
          RELATIVE_PREFIX: ${{ env.RELATIVE_PREFIX }}
          PR_REPO: ${{ inputs.repo }}
          PR_TITLE: ${{ inputs.title }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          ARTIFACT_URL: ${{ steps.upload-links.outputs.artifact-url }}
        run: >
          go run ./link-checker/cmd/link-checker comment
          -links links.json
          -base-ref "${PR_BASE_SHA}"
          -output broken-links-comment.md
          -repo "${PR_REPO}"
          -title "${PR_TITLE}"
          -artifact-url "${ARTIFACT_URL}"

      - name: Print broken links comment
        run: cat broken-links-comment.md

      - name: Find broken links comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        id: broken-links-comment
        with:
          issue-number: ${{ inputs.event_number }}
          comment-author: github-actions[bot]
          body-includes: <!-- broken-links-report:${{ inputs.repo }} -->

      - name: Create broken links comment
        if: steps.broken-links-comment.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ inputs.event_number }}
          body-path: broken-links-comment.md

      - name: Update broken links comment
        if: steps.broken-links-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ steps.broken-links-comment.outputs.comment-id }}
          issue-number: ${{ inputs.event_number }}
          edit-mode: replace
          body-path: broken-links-comment.md

  cleanup-preview:
    permissions:
      id-token: write
      pull-requests: write
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Find comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        id: fc
        with:
          issue-number: ${{ inputs.event_number }}
          comment-author: github-actions[bot]
          body-includes: Deploy preview available (${{ inputs.title }})

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        id: gcloud-auth-cloud-run
        with:
          workload_identity_provider: projects/304398677251/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-docs-cloud-run-dev@grafanalabs-workload-identity.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1
        with:
          project_id: grafanalabs-dev

      - name: Delete deploy preview
        env:
          REPO: ${{ inputs.repo }}
          EVENT_NUMBER: ${{ inputs.event_number }}
        run: |
          SERVICE_NAME="deploy-preview-${REPO}-${EVENT_NUMBER}"
          if gcloud run services describe "$SERVICE_NAME" --region="$CLOUD_RUN_REGION" --project=grafanalabs-dev > /dev/null 2>&1; then
            gcloud run services delete "$SERVICE_NAME" --region="$CLOUD_RUN_REGION" --project=grafanalabs-dev --quiet
          else
            echo "Service $SERVICE_NAME does not exist. Skipping step."
          fi

      - name: Update comment with deleted deploy preview
        if: steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ env.EVENT_NUMBER }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            :computer: Deploy preview deleted (${{ inputs.title }}).
