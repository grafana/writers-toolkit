name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@b7a8afda22c7f80a4a6abe853b65f2053b61ee80 # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
