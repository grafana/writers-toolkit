name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@d76e201ab81f74dab4d3c6355c39952be3667402 # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
