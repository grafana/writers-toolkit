name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@24d5136b346277220c02d9ee1d1b837b03c14022 # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
