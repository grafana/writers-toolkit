name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@614d489f864975e95137d4b0bf28e585ec15a5d5 # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
