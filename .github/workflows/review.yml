name: Check for pages that require review

permissions: {}
on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  main:
    if: github.repository == 'grafana/writers-toolkit'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.21

      - name: Build tool
        working-directory: tools
        run: go build ./cmd/review

      - name: Run tool
        run: ./tools/review ./docs/sources | head -n 3 > .to-review.txt

      - name: Create issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs')

            const opts = github.rest.issues.listForRepo.endpoint.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
            });
            const issues = await github.paginate(opts);

            fs.readFileSync(".to-review.txt", "utf-8")
              .split("\n")
              .forEach((line) => {
                const path = line.replace(/:1:1$/, "");
                const title = `Review \`${path}\``;

                if (path === "") {
                  return
                }

                for (const issue of issues) {
                  if (issue.pull_request) {
                    continue
                  }

                  if (issue.title === title && issue.state === 'open') {
                    return
                  }
                }

                github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  assignees: ['jdbaldry'],
                });
              });
