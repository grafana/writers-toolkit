name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@44517282d5d187d6f589c50ecc68e85644dd2627 # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
