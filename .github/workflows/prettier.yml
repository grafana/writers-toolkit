name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@f101b7ca23c695f06ff1414fffbc690f2e46e2ff # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
