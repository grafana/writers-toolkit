name: Run `prettier` on a branch
on:
  workflow_dispatch:
jobs:
  prettier:
    if: ${{ github.repository == 'grafana/writers-toolkit' }}
    runs-on: ubuntu-latest
    steps:
      - uses: grafana/writers-toolkit/prettier@80cc5bbbe4a64263d5f1f8aae5ef9621731ebe04 # prettier/v2.0.1
        with:
          branch: ${{ env.GITHUB_REF }}
